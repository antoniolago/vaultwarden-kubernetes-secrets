nameOverride: ""
fullnameOverride: ""

# Global configuration
global:
  # Global image tag - applies to all components unless overridden
  # Leave empty to use Chart.AppVersion or component-specific tags
  imageTag: ""

image:
  repository: ghcr.io/antoniolago/vaultwarden-kubernetes-secrets
  tag: ""  # Leave empty to use global.imageTag or Chart.AppVersion
  pullPolicy: IfNotPresent

# Image pull secrets for private registries
imagePullSecrets: []
# - name: my-registry-secret

rbac:
  create: true
  clusterWide: true

serviceAccount:
  create: true
  name: "vaultwarden-kubernetes-secrets"

# Namespace management
namespace:
  create: false
  name: "vaultwarden-kubernetes-secrets"

debug: false

replicaCount: 1

# API Configuration
api:
  enabled: false 
  replicaCount: 1
  image:
    repository: ghcr.io/antoniolago/vaultwarden-kubernetes-secrets-api
    tag: ""  # Leave empty to use global.imageTag or Chart.AppVersion
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  databasePath: /data/sync.db
  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: ""
  auth:
    enabled: true
    # Leave empty to auto-generate a random 32-character token
    # The token is persisted in a Kubernetes secret and reused on upgrades
    # Or set explicitly: token: "your-secret-token-here"
    token: ""
    # Loginless mode - disables authentication (NOT RECOMMENDED for production)
    loginlessMode: false

# Dashboard Configuration
dashboard:
  enabled: false  
  replicaCount: 2
  image:
    repository: ghcr.io/antoniolago/vaultwarden-kubernetes-secrets-dashboard
    tag: ""  # Leave empty to use global.imageTag or Chart.AppVersion
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi
  # API URL for dashboard to connect to backend API
  # If not specified, defaults to in-cluster service: http://<release-name>-api:8080/api
  apiUrl: ""
  url: "http://localhost:3000"
  # Loginless mode - should match api.auth.loginlessMode
  loginlessMode: false

# Ingress Configuration
ingress:
  enabled: false
  className: "" #e.g: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts: []
    # - host: vaultwarden-sync.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
    #       backend: dashboard
    #       port: 80
    #     - path: /api
    #       pathType: Prefix
    #       backend: api
    #       port: 8080
  tls: []
    # - secretName: vaultwarden-sync-tls
    #   hosts:
    #     - vaultwarden-sync.example.com

resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    cpu: 100m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL

env:
  config:
    VAULTWARDEN__SERVERURL: "https://your-vaultwarden-server.com"
    VAULTWARDEN__ORGANIZATIONID: "" #RECOMMENDED
    VAULTWARDEN__ORGANIZATIONNAME: ""
    VAULTWARDEN__FOLDERID: ""
    VAULTWARDEN__FOLDERNAME: ""
    VAULTWARDEN__COLLECTIONID: "" #RECOMMENDED
    VAULTWARDEN__COLLECTIONNAME: ""
    # Optional: Fixed device identifier to prevent "New device logged in" notifications
    # If not set, a deterministic ID is auto-generated from SERVERURL + BW_CLIENTID
    # VAULTWARDEN__DEVICEID: ""
    KUBERNETES__INCLUSTER: "true"
    KUBERNETES__DEFAULTNAMESPACE: "default"
    SYNC__DRYRUN: "false"
    SYNC__DELETEORPHANS: "true"
    SYNC__SECRETPREFIX: ""
    SYNC__SYNCINTERVALSECONDS: "30"
    SYNC__CONTINUOUSSYNC: "true"
    LOGGING__LOGLEVEL__DEFAULT: "Information"
    LOGGING__LOGLEVEL__MICROSOFT: "Warning"
    LOGGING__LOGLEVEL__MICROSOFT__HOSTING__LIFETIME: "Information"
  secrets:
    # For security, I suggest creating an account just for this purpose
    # WARNING: Organization API keys are not supported by VW API
    BW_CLIENTID:
      secretName: "vaultwarden-kubernetes-secrets"
      secretKey: "BW_CLIENTID"
    BW_CLIENTSECRET:
      secretName: "vaultwarden-kubernetes-secrets"
      secretKey: "BW_CLIENTSECRET"
    VAULTWARDEN__MASTERPASSWORD:
      secretName: "vaultwarden-kubernetes-secrets"
      secretKey: "VAULTWARDEN__MASTERPASSWORD"

  # Configure note/custom-field tag names understood by the app
  fields:
    # SYNC__FIELD__NAMESPACES
    namespaces: "namespaces"
    # SYNC__FIELD__SECRETNAME
    secretName: "secret-name"
    # SYNC__FIELD__SECRETKEYPASSWORD
    secretKeyPassword: "secret-key-password"
    # SYNC__FIELD__SECRETKEYUSERNAME
    secretKeyUsername: "secret-key-username"
    # SYNC__FIELD__SECRETKEY (legacy)
    secretKey: "secret-key"
    # SYNC__FIELD__INLINEKVPREFIX
    inlineKvPrefix: "kv"
    # SYNC__FIELD__SECRETBLOCKPREFIX
    secretBlockPrefix: "secret"
    # SYNC__FIELD__REPLACEMENT_CHAR
    replacementChar: "-"
    # SYNC__FIELD__SECRETANNOTATIONS
    # Multiline Note field where each line is "key=value" or "key: value"
    secretAnnotations: "secret-annotation"
    # SYNC__FIELD__SECRETLABELS
    # Multiline Note field where each line is "key=value" or "key: value"
    secretLabels: "secret-label"
    # SYNC__FIELD__CONTEXTNAME
    # Filter items by cluster context (multi-cluster deployments)
    contextName: "context-name"

  # Multi-cluster support: auto-detects context name from kubeconfig
  # Set this to override auto-detection (optional)
  # When left empty, uses the current Kubernetes context name automatically
  contextName: ""

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Monitoring configuration
monitoring:
  # Enable Prometheus ServiceMonitor (requires Prometheus Operator)
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}
    metricRelabelings: []
    relabelings: []
  
  # Enable Grafana dashboard ConfigMap
  grafanaDashboard:
    enabled: false
    namespace: ""  # Leave empty to use release namespace
    labels:
      grafana_dashboard: "1"
    annotations: {}
