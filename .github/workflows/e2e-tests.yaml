name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      keep_cluster:
        description: 'Keep cluster after tests for debugging'
        required: false
        default: 'false'
      verbose:
        description: 'Enable verbose output'
        required: false
        default: 'false'

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
      
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'
      
      - name: Install Bitwarden CLI
        run: |
          curl -L "https://github.com/bitwarden/clients/releases/download/cli-v2024.2.0/bw-linux-2024.2.0.zip" -o bw.zip
          unzip bw.zip
          chmod +x bw
          sudo mv bw /usr/local/bin/
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          pip install -r tests/e2e/requirements.txt
      
      - name: Make scripts executable
        run: |
          chmod +x tests/e2e/*.sh
          chmod +x tests/e2e/lib/*.py
      
      - name: Run E2E Tests
        env:
          E2E_CLUSTER_NAME: vks-e2e-ci
          E2E_KEEP_CLUSTER: ${{ github.event.inputs.keep_cluster || 'false' }}
          E2E_VERBOSE: ${{ github.event.inputs.verbose || 'false' }}
          E2E_TIMEOUT: 600
        run: |
          ./tests/e2e/run-e2e-tests.sh
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            tests/e2e/.test-results.json
            tests/e2e/.test-credentials.json
          retention-days: 7
      
      - name: Parse test results
        if: always()
        run: |
          if [ -f tests/e2e/.test-results.json ]; then
            echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            VERDICT=$(jq -r '.verdict' tests/e2e/.test-results.json)
            TOTAL=$(jq -r '.summary.total' tests/e2e/.test-results.json)
            PASSED=$(jq -r '.summary.passed' tests/e2e/.test-results.json)
            FAILED=$(jq -r '.summary.failed' tests/e2e/.test-results.json)
            DURATION=$(jq -r '.duration_seconds' tests/e2e/.test-results.json)
            
            if [ "$VERDICT" = "PASS" ]; then
              echo "✅ **All tests passed!**" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Some tests failed**" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Test Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            jq -r '.tests[] | "- " + (if .status == "passed" then "✅" else "❌" end) + " **" + .name + "**: " + .message' tests/e2e/.test-results.json >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Cleanup on failure (get logs)
        if: failure()
        run: |
          echo "=== Cluster Info ==="
          kubectl cluster-info || true
          
          echo ""
          echo "=== All Pods ==="
          kubectl get pods -A || true
          
          echo ""
          echo "=== Vaultwarden Logs ==="
          kubectl logs -n vaultwarden -l app=vaultwarden --tail=100 || true
          
          echo ""
          echo "=== Operator Logs ==="
          kubectl logs -n vaultwarden-kubernetes-secrets -l app.kubernetes.io/name=vaultwarden-kubernetes-secrets --tail=100 || true
          
          echo ""
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -50 || true
      
      - name: Cleanup cluster
        if: always()
        run: |
          kind delete cluster --name vks-e2e-ci || true
