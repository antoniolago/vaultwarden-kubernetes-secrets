---
# Vaultwarden Deployment for E2E Testing
# This deploys a minimal Vaultwarden instance for testing purposes

apiVersion: v1
kind: ConfigMap
metadata:
  name: vaultwarden-config
  namespace: vaultwarden
data:
  # Disable signups after initial user is created (we'll enable temporarily via env)
  SIGNUPS_ALLOWED: "true"
  # Disable email verification for testing
  SIGNUPS_VERIFY: "false"
  # Enable admin panel (for debugging if needed)
  ADMIN_TOKEN: "e2e-admin-token-for-testing-only"
  # Enable API with TLS
  ROCKET_PORT: "443"
  ROCKET_TLS: "{certs=\"/ssl/tls.crt\",key=\"/ssl/tls.key\"}"
  # Domain for proper URL generation
  DOMAIN: "https://localhost:30443"
  # Log level
  LOG_LEVEL: "info"
  # Enable websocket notifications
  WEBSOCKET_ENABLED: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
  labels:
    app: vaultwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      containers:
      - name: vaultwarden
        image: vaultwarden/server:1.30.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 443
          name: https
        - containerPort: 3012
          name: websocket
        envFrom:
        - configMapRef:
            name: vaultwarden-config
        volumeMounts:
        - name: data
          mountPath: /data
        - name: tls
          mountPath: /ssl
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/alive
            port: 443
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/alive
            port: 443
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
      volumes:
      - name: data
        emptyDir: {}
      - name: tls
        secret:
          secretName: vaultwarden-tls

---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  selector:
    app: vaultwarden
  ports:
  - name: https
    port: 443
    targetPort: 443
  - name: websocket
    port: 3012
    targetPort: 3012

---
# NodePort service for external access during testing
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden-external
  namespace: vaultwarden
spec:
  type: NodePort
  selector:
    app: vaultwarden
  ports:
  - name: https
    port: 443
    targetPort: 443
    nodePort: 30443
